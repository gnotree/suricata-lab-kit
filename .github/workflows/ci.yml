name: CI
on:
  push:
  pull_request:
jobs:
  suricata-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install suricata
        run: |
          sudo apt-get update
          sudo apt-get install -y suricata
      - name: validate config
        run: ./scripts/10_validate_suricata.sh
